<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>税务技能大赛题库练习</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --blue: #1e40af; --blue-light: #3b82f6;
  --teal: #0f766e; --teal-light: #14b8a6;
  --bg: #f0f2f5; --card: #ffffff;
  --text: #1e293b; --muted: #64748b;
  --border: #e2e8f0;
  --correct: #16a34a; --correct-bg: #dcfce7;
  --wrong: #dc2626; --wrong-bg: #fee2e2;
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { background: linear-gradient(135deg, var(--blue), var(--blue-light)); color: white; padding: 24px 20px 20px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(30,64,175,0.25); }
.header h1 { font-size: 1.4em; font-weight: 700; margin-bottom: 4px; }
.header p { font-size: 0.85em; opacity: 0.8; }
.tabs { background: white; display: flex; gap: 4px; padding: 0 12px; overflow-x: auto; border-bottom: 1px solid var(--border); position: sticky; top: 76px; z-index: 99; }
.tab { padding: 10px 14px; font-size: 0.85em; white-space: nowrap; cursor: pointer; border: none; background: none; color: var(--muted); border-bottom: 3px solid transparent; transition: all 0.2s; }
.tab:hover { color: var(--blue); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
.progress-bar { background: white; padding: 10px 16px; display: flex; align-items: center; gap: 12px; font-size: 0.85em; color: var(--muted); border-bottom: 1px solid var(--border); }
.progress-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--blue-light)); border-radius: 3px; transition: width 0.3s; }
.progress-text { min-width: 80px; text-align: right; }
.stats-bar { background: white; padding: 8px 16px; display: flex; gap: 16px; font-size: 0.82em; color: var(--muted); border-bottom: 1px solid var(--border); }
.stat { display: flex; align-items: center; gap: 4px; }
.stat strong { color: var(--blue); font-size: 1.1em; }
.app { max-width: 800px; margin: 0 auto; padding: 20px 16px 100px; }

.type-filter { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.type-btn { padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border); background: white; font-size: 0.82em; cursor: pointer; color: var(--muted); transition: all 0.2s; font-weight: 500; }
.type-btn:hover { border-color: var(--blue-light); color: var(--blue); }
.type-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
.type-btn.multi.active { background: var(--teal); border-color: var(--teal); }
.type-btn.judge.active { background: #7c3aed; border-color: #7c3aed; }

.two-groups { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.group-card { background: white; border-radius: 20px; padding: 28px 20px; text-align: center; cursor: pointer; transition: all 0.25s; box-shadow: 0 4px 16px rgba(0,0,0,0.06); border: 3px solid transparent; }
.group-card.blue { border-color: #dbeafe; }
.group-card.blue:hover { border-color: var(--blue); transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.14); }
.group-card.teal { border-color: #ccfbf1; }
.group-card.teal:hover { border-color: var(--teal); transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.14); }
.group-card .icon { font-size: 2.5em; margin-bottom: 12px; }
.group-card h2 { font-size: 1.1em; margin-bottom: 6px; }
.group-card .sub { font-size: 0.82em; color: var(--muted); margin-bottom: 10px; }
.group-card .num { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 0.85em; font-weight: 700; }
.blue .num { background: #dbeafe; color: var(--blue); }
.teal .num { background: #ccfbf1; color: var(--teal); }

.stat-pills { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.pill { padding: 3px 10px; border-radius: 20px; font-size: 0.75em; font-weight: 600; }
.pill-single { background: #dbeafe; color: #1d4ed8; }
.pill-multi { background: #ccfbf1; color: #0f766e; }
.pill-judge { background: #ede9fe; color: #6d28d9; }

.bank-list { display: flex; flex-direction: column; gap: 10px; }
.bank-card { background: white; border-radius: 14px; padding: 18px 20px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.bank-card:hover { border-color: var(--blue-light); transform: translateX(4px); }
.bank-icon { font-size: 1.8em; }
.bank-info h3 { font-size: 0.95em; font-weight: 600; margin-bottom: 2px; }
.bank-info .desc { font-size: 0.78em; color: var(--muted); }
.bank-stats { margin-left: auto; display: flex; gap: 6px; }
.bank-arrow { margin-left: 8px; color: var(--muted); font-size: 1.2em; }

.question-card { background: var(--card); border-radius: 20px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 16px; }
.question-meta { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.tag { padding: 3px 10px; border-radius: 20px; font-size: 0.75em; font-weight: 600; }
.tag-single { background: #dbeafe; color: #1d4ed8; }
.tag-multi { background: #ccfbf1; color: #0f766e; }
.tag-judge { background: #ede9fe; color: #6d28d9; }
.tag-bank { background: #f1f5f9; color: var(--muted); }
.tag-num { background: #fef3c7; color: #92400e; margin-left: auto; }
.question-text { font-size: 1.02em; line-height: 1.75; color: var(--text); white-space: pre-wrap; margin-bottom: 20px; }

.options { display: flex; flex-direction: column; gap: 10px; }
.option { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 2px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.2s; line-height: 1.6; }
.option:hover:not(.disabled) { border-color: var(--blue-light); background: #eff6ff; }
.option.selected { border-color: var(--blue); background: #eff6ff; }
.option.correct { border-color: var(--correct); background: var(--correct-bg); }
.option.wrong { border-color: var(--wrong); background: var(--wrong-bg); }
.option.disabled { cursor: default; }
.opt-letter { width: 28px; height: 28px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85em; flex-shrink: 0; border: 2px solid var(--border); transition: all 0.2s; }
.option.selected .opt-letter { background: var(--blue); color: white; border-color: var(--blue); }
.option.correct .opt-letter { background: var(--correct); color: white; border-color: var(--correct); }
.option.wrong .opt-letter { background: var(--wrong); color: white; border-color: var(--wrong); }
.opt-text { font-size: 0.95em; line-height: 1.6; flex: 1; white-space: pre-wrap; }

.answer-box { margin-top: 16px; padding: 16px; border-radius: 12px; display: none; }
.answer-box.show { display: block; }
.answer-box.correct-ans { background: var(--correct-bg); border-left: 4px solid var(--correct); }
.answer-box.wrong-ans { background: var(--wrong-bg); border-left: 4px solid var(--wrong); }
.answer-title { font-weight: 700; margin-bottom: 6px; font-size: 0.9em; }
.answer-title.correct { color: var(--correct); }
.answer-title.wrong { color: var(--wrong); }
.analysis { font-size: 0.88em; line-height: 1.7; color: var(--muted); margin-top: 8px; background: #f8fafc; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
.analysis-title { font-weight: 600; color: var(--text); margin-bottom: 4px; }
.btn-row { display: flex; gap: 10px; margin-top: 16px; }
.btn { flex: 1; padding: 12px 20px; border: none; border-radius: 12px; font-size: 0.95em; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover:not(:disabled) { background: var(--blue-light); transform: translateY(-1px); }
.btn-outline { background: white; color: var(--blue); border: 2px solid var(--blue); }
.btn-outline:hover { background: #eff6ff; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.summary { background: white; border-radius: 20px; padding: 36px 24px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.summary h2 { color: var(--blue); margin-bottom: 20px; font-size: 1.3em; }
.summary-rate { font-size: 3.5em; font-weight: 800; color: var(--blue); margin: 12px 0; }
.summary-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 24px; }
.summary-stat .num { font-size: 2em; font-weight: 700; }
.summary-stat .label { font-size: 0.85em; color: var(--muted); margin-top: 4px; }
.summary-msg { color: var(--muted); margin-bottom: 24px; font-size: 1.05em; }

.loading { text-align: center; padding: 60px; color: var(--muted); }
.spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }

.back-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: white; border: 1px solid var(--border); border-radius: 20px; font-size: 0.85em; color: var(--muted); cursor: pointer; margin-bottom: 16px; }
.back-btn:hover { border-color: var(--blue); color: var(--blue); }

@media (max-width: 480px) { .two-groups { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1>📚 税务技能大赛题库练习</h1>
  <p>共 <span id="totalCount">--</span> 题 · 选择题库开始练习</p>
</div>

<div class="tabs" id="tabs" style="display:none"></div>
<div class="progress-bar" id="progressBar" style="display:none">
  <span>进度</span>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <span class="progress-text" id="progressText">0/0</span>
</div>
<div class="stats-bar" id="statsBar" style="display:none">
  <div class="stat">✅ 正确 <strong id="correctCount">0</strong></div>
  <div class="stat">❌ 错误 <strong id="wrongCount">0</strong></div>
  <div class="stat" style="margin-left:auto">正确率 <strong id="accuracy">--%</strong></div>
</div>

<div class="app" id="app">
  <div class="loading"><div class="spinner"></div>加载题库中...</div>
</div>

<script>
let questions = {};
let currentGroup = null;
let currentBank = null;
let currentIndex = 0;
let sessionCorrect = 0;
let sessionWrong = 0;
let sessionTotal = 0;
let answered = false;
let currentFilter = 'all';
let selectedOptions = []; // 多选题已选选项

const $ = id => document.getElementById(id);

async function loadQuestions() {
  try {
    const r = await fetch('questions.json?t=' + Date.now());
    questions = await r.json();
    const total = Object.values(questions).reduce((s, g) => s + Object.values(g).reduce((a, qs) => a + qs.length, 0), 0);
    $('totalCount').textContent = total;
    showHome();
  } catch(e) {
    $('app').innerHTML = '<div class="loading">加载失败: ' + e.message + '<br><button class="btn btn-primary" style="margin-top:16px" onclick="loadQuestions()">重试</button></div>';
  }
}

function typeTag(type) {
  if (type === '单选题') return '<span class="tag tag-single">单选题</span>';
  if (type === '多选题') return '<span class="tag tag-multi">多选题</span>';
  if (type === '判断题') return '<span class="tag tag-judge">判断题</span>';
  return '<span class="tag tag-single">' + type + '</span>';
}

function showHome() {
  const g1 = questions['备考题库'] || {};
  const g2 = questions['税费大赛'] || {};
  const g1Total = Object.values(g1).reduce((s, a) => s + a.length, 0);
  const g2Total = Object.values(g2).reduce((s, a) => s + a.length, 0);

  $('app').innerHTML =
    '<div class="two-groups">' +
      '<div class="group-card blue" onclick="showGroup(\'备考题库\')">' +
        '<div class="icon">📋</div>' +
        '<h2>技能大赛备考题库</h2>' +
        '<div class="sub">来源于两测题库</div>' +
        '<span class="num">' + g1Total + ' 题</span>' +
      '</div>' +
      '<div class="group-card teal" onclick="showGroup(\'税费大赛\')">' +
        '<div class="icon">📖</div>' +
        '<h2>税费大赛部分题库</h2>' +
        '<div class="sub">章节专题训练</div>' +
        '<span class="num">' + g2Total + ' 题</span>' +
      '</div>' +
    '</div>' +
    '<div class="group-desc"><p>📋 <strong>技能大赛备考题库</strong>：税务公共知识、强基培训、征收管理、纳税服务、税务稽查，含单选/多选/判断三种题型。</p></div>' +
    '<div class="group-desc"><p>📖 <strong>税费大赛部分题库</strong>：新时代税务事业、税费政策管理、税费征收管理、税费风险管理章节专题。</p></div>';
  $('tabs').style.display = 'none';
  $('progressBar').style.display = 'none';
  $('statsBar').style.display = 'none';
}

function showGroup(name) {
  currentGroup = name;
  const banks = questions[name] || {};
  const icons = ['📖', '📗', '📘', '📙', '📓', '📔', '📒'];
  const descs = {
    '税务公共知识': '核心知识点',
    '强基培训': '基础知识强化',
    '征收管理': '税费征管实务',
    '纳税服务': '服务与便利化',
    '税务稽查': '稽查实务与案例',
    '第六七章 税费风险管理/大数据': '税费风险与数据应用',
    '第一二八章 新时代税务事业': '新时代税务发展',
    '第三章 税费政策管理': '税费政策专题',
    '第四章 税费征收管理': '征管基础与流程',
  };

  let html = '<button class="back-btn" onclick="showHome()">← 返回首页</button>' +
    '<h2 style="font-size:1.1em;margin-bottom:16px;color:var(--blue)">' + name + ' · ' + Object.values(banks).reduce((s,a)=>s+a.length,0) + ' 题</h2>' +
    '<div class="bank-list">';
  let i = 0;
  for (const [bank, qs] of Object.entries(banks)) {
    const icon = icons[i % icons.length];
    const desc = descs[bank] || '';
    const sc = qs.filter(q => q.type === '单选题').length;
    const mc = qs.filter(q => q.type === '多选题').length;
    const jc = qs.filter(q => q.type === '判断题').length;
    html +=
      '<div class="bank-card" onclick="startQuiz(\'' + bank.replace(/'/g, "\\'") + '\')">' +
        '<div class="bank-icon">' + icon + '</div>' +
        '<div class="bank-info"><h3>' + bank + '</h3><div class="desc">' + desc + ' · ' + qs.length + ' 题</div></div>' +
        '<div class="bank-stats">' +
          (sc > 0 ? '<span class="pill pill-single">单' + sc + '</span>' : '') +
          (mc > 0 ? '<span class="pill pill-multi">多' + mc + '</span>' : '') +
          (jc > 0 ? '<span class="pill pill-judge">判' + jc + '</span>' : '') +
        '</div>' +
        '<div class="bank-arrow">→</div>' +
      '</div>';
    i++;
  }
  html += '</div>';
  $('app').innerHTML = html;
  showTabs();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(bank, filterType) {
  const list = questions[currentGroup] && questions[currentGroup][bank];
  if (!list || list.length === 0) { alert('暂无题目'); return; }

  currentFilter = filterType || 'all';

  let filtered = list;
  if (currentFilter === 'single') filtered = list.filter(q => q.type === '单选题');
  else if (currentFilter === 'multi') filtered = list.filter(q => q.type === '多选题');
  else if (currentFilter === 'judge') filtered = list.filter(q => q.type === '判断题');

  if (filtered.length === 0) { alert('该题库没有此类型题目'); return; }

  if (!window._shuffled) window._shuffled = {};
  window._shuffled[bank + '_' + currentFilter] = shuffle(filtered);

  currentBank = bank;
  currentIndex = 0;
  sessionCorrect = 0;
  sessionWrong = 0;
  sessionTotal = filtered.length;

  showTabs();
  $('progressBar').style.display = 'flex';
  $('statsBar').style.display = 'flex';
  showQuestion();
}

function showTabs() {
  let html = '<button class="tab" onclick="showHome()">🏠 首页</button>';
  for (const g of Object.keys(questions)) {
    const active = g === currentGroup ? ' active' : '';
    html += '<button class="tab' + active + '" onclick="showGroup(\'' + g + '\')">' + g + '</button>';
  }
  $('tabs').innerHTML = html;
  $('tabs').style.display = 'flex';
}

function updateProgress() {
  const key = currentBank + '_' + currentFilter;
  const list = window._shuffled && window._shuffled[key];
  if (!list) return;
  const pct = sessionTotal > 0 ? Math.round((currentIndex / sessionTotal) * 100) : 0;
  $('progressFill').style.width = pct + '%';
  $('progressText').textContent = currentIndex + '/' + sessionTotal;
  $('correctCount').textContent = sessionCorrect;
  $('wrongCount').textContent = sessionWrong;
  const acc = currentIndex > 0 ? Math.round((sessionCorrect / currentIndex) * 100) : 0;
  $('accuracy').textContent = acc + '%';
}

function showQuestion() {
  const key = currentBank + '_' + currentFilter;
  const list = window._shuffled && window._shuffled[key];
  if (!list || currentIndex >= list.length) { showSummary(); return; }
  answered = false;
  selectedOptions = [];
  updateProgress();
  const q = list[currentIndex];

  const isMulti = q.type === '多选题';
  const optsHtml = q.options.map(function(o) {
    return '<div class="option" data-letter="' + o.letter + '" onclick="selectOption(\'' + o.letter + '\')">' +
      '<div class="opt-letter">' + o.letter + '</div>' +
      '<div class="opt-text">' + escapeHtml(o.text) + '</div>' +
    '</div>';
  }).join('');

  const typeFilterHtml =
    '<div class="type-filter" style="margin-bottom:14px">' +
      '<button class="type-btn ' + (currentFilter==='all'?'active':'') + '" onclick="jumpFilter(\'all\')">全部</button>' +
      '<button class="type-btn ' + (currentFilter==='single'?'active':'') + '" onclick="jumpFilter(\'single\')">单选题</button>' +
      '<button class="type-btn multi ' + (currentFilter==='multi'?'active':'') + '" onclick="jumpFilter(\'multi\')">多选题</button>' +
      '<button class="type-btn judge ' + (currentFilter==='judge'?'active':'') + '" onclick="jumpFilter(\'judge\')">判断题</button>' +
    '</div>';

  $('app').innerHTML =
    '<button class="back-btn" onclick="showGroup(currentGroup)">← ' + currentGroup + '</button>' +
    typeFilterHtml +
    '<div class="question-card">' +
      '<div class="question-meta">' +
        typeTag(q.type) +
        '<span class="tag tag-bank">' + escapeHtml(q.bank || currentBank) + '</span>' +
        '<span class="tag tag-num">第 ' + (currentIndex+1) + ' / ' + sessionTotal + ' 题</span>' +
      '</div>' +
      '<div class="question-text">' + escapeHtml(q.question) + '</div>' +
      '<div class="options" id="options">' + optsHtml + '</div>' +
      '<div class="answer-box" id="answerBox"></div>' +
      '<div class="btn-row" id="btnRow">' +
        (isMulti
          ? '<button class="btn btn-primary" id="confirmBtn" onclick="confirmMulti()" disabled>确认提交</button><button class="btn btn-outline" onclick="showAnswer()">查看答案</button>'
          : '<button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>下一题 →</button><button class="btn btn-outline" onclick="showAnswer()">查看答案</button>') +
      '</div>' +
    '</div>';

  // 多选题提示
  if (isMulti) {
    var hint = document.createElement('div');
    hint.style.cssText = 'font-size:0.82em;color:#0f766e;margin-bottom:10px';
    hint.textContent = '💡 多选题：请选择所有正确选项后点击"确认提交"';
    var opts = $('options');
    opts.parentNode.insertBefore(hint, opts);
  }
}

function escapeHtml(text) {
  if (!text) return '';
  return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function jumpFilter(type) {
  currentIndex = 0;
  sessionCorrect = 0;
  sessionWrong = 0;
  startQuiz(currentBank, type);
}

function selectOption(letter) {
  if (answered) return;
  const key = currentBank + '_' + currentFilter;
  const list = window._shuffled && window._shuffled[key];
  const q = list[currentIndex];
  const isMulti = q.type === '多选题';

  if (isMulti) {
    // 多选题：切换选中状态
    const idx = selectedOptions.indexOf(letter);
    if (idx >= 0) {
      selectedOptions.splice(idx, 1);
    } else {
      selectedOptions.push(letter);
    }
    // 更新UI
    document.querySelectorAll('.option').forEach(function(el) {
      if (selectedOptions.indexOf(el.dataset.letter) >= 0) {
        el.classList.add('selected');
      } else {
        el.classList.remove('selected');
      }
    });
    // 启用确认按钮
    const confirmBtn = $('confirmBtn');
    if (confirmBtn) {
      confirmBtn.disabled = selectedOptions.length === 0;
    }
  } else {
    // 单选题/判断题：直接判定
    answered = true;
    const correctSet = new Set(q.answer);
    const isCorrect = correctSet.has(letter);
    if (isCorrect) sessionCorrect++; else sessionWrong++;

    document.querySelectorAll('.option').forEach(function(el) {
      el.classList.add('disabled');
      if (correctSet.has(el.dataset.letter)) el.classList.add('correct');
      else if (el.dataset.letter === letter) el.classList.add('wrong');
    });

    showAnswerBox(isCorrect, q);
    const nextBtn = $('nextBtn');
    if (nextBtn) nextBtn.disabled = false;
    updateProgress();
  }
}

function confirmMulti() {
  if (answered) return;
  if (selectedOptions.length === 0) return;
  answered = true;

  const key = currentBank + '_' + currentFilter;
  const list = window._shuffled && window._shuffled[key];
  const q = list[currentIndex];

  const correctSet = new Set(q.answer);
  const selectedSet = new Set(selectedOptions);

  // 多选题判分：所选集合与正确集合完全一致才算正确
  let isCorrect = true;
  if (correctSet.size !== selectedSet.size) {
    isCorrect = false;
  } else {
    for (const a of correctSet) {
      if (!selectedSet.has(a)) { isCorrect = false; break; }
    }
  }

  if (isCorrect) sessionCorrect++; else sessionWrong++;

  document.querySelectorAll('.option').forEach(function(el) {
    el.classList.add('disabled');
    el.classList.remove('selected');
    if (correctSet.has(el.dataset.letter)) el.classList.add('correct');
    else if (selectedSet.has(el.dataset.letter)) el.classList.add('wrong');
  });

  showAnswerBox(isCorrect, q);

  // 替换确认按钮为下一题按钮
  const btnRow = $('btnRow');
  if (btnRow) {
    btnRow.innerHTML = '<button class="btn btn-primary" onclick="nextQuestion()">下一题 →</button><button class="btn btn-outline" onclick="showGroup(currentGroup)">退出</button>';
  }
  updateProgress();
}

function showAnswerBox(isCorrect, q) {
  const box = $('answerBox');
  const correctAns = q.answer.join('、');
  box.className = 'answer-box show ' + (isCorrect ? 'correct-ans' : 'wrong-ans');
  box.innerHTML =
    '<div class="answer-title ' + (isCorrect ? 'correct' : 'wrong') + '">' +
      (isCorrect ? '✅ 回答正确！' : '❌ 回答错误') +
    '</div>' +
    (isCorrect ? '' : '<div style="font-size:0.88em;color:var(--muted)">正确答案：<strong>' + correctAns + '</strong></div>') +
    (q.analysis ? '<div class="analysis"><div class="analysis-title">📝 解析</div>' + escapeHtml(q.analysis) + '</div>' : '');
}

function showAnswer() {
  if (answered) return;
  answered = true;
  const key = currentBank + '_' + currentFilter;
  const list = window._shuffled && window._shuffled[key];
  const q = list[currentIndex];

  const correctSet = new Set(q.answer);
  document.querySelectorAll('.option').forEach(function(el) {
    el.classList.add('disabled');
    el.classList.remove('selected');
    if (correctSet.has(el.dataset.letter)) el.classList.add('correct');
  });

  const box = $('answerBox');
  box.className = 'answer-box show correct-ans';
  box.innerHTML =
    '<div class="answer-title correct">答案：' + q.answer.join('、') + '</div>' +
    (q.analysis ? '<div class="analysis"><div class="analysis-title">📝 解析</div>' + escapeHtml(q.analysis) + '</div>' : '');

  const btnRow = $('btnRow');
  if (btnRow) {
    btnRow.innerHTML = '<button class="btn btn-primary" onclick="nextQuestion()">下一题 →</button><button class="btn btn-outline" onclick="showGroup(currentGroup)">退出</button>';
  }
  updateProgress();
}

function nextQuestion() {
  currentIndex++;
  showQuestion();
}

function showSummary() {
  const rate = sessionTotal > 0 ? Math.round((sessionCorrect / sessionTotal) * 100) : 0;
  const msgs = ['继续加油！💪', '还需多练习 📚', '不错！继续保持 🔥', '很棒！🎉', '满分！太厉害了！🏆'];
  const idx = rate < 40 ? 0 : rate < 60 ? 1 : rate < 80 ? 2 : rate < 95 ? 3 : 4;

  $('app').innerHTML =
    '<div class="summary">' +
      '<h2>🎉 ' + escapeHtml(currentBank) + ' 练习完成！</h2>' +
      '<div class="summary-rate">' + rate + '%</div>' +
      '<div class="summary-stats">' +
        '<div class="summary-stat"><div class="num" style="color:var(--correct)">' + sessionCorrect + '</div><div class="label">正确</div></div>' +
        '<div class="summary-stat"><div class="num" style="color:var(--wrong)">' + sessionWrong + '</div><div class="label">错误</div></div>' +
        '<div class="summary-stat"><div class="num" style="color:var(--muted)">' + sessionTotal + '</div><div class="label">总计</div></div>' +
      '</div>' +
      '<div class="summary-msg">' + msgs[idx] + '</div>' +
      '<div class="btn-row">' +
        '<button class="btn btn-primary" onclick="startQuiz(currentBank,currentFilter)">🔄 再练一遍</button>' +
        '<button class="btn btn-outline" onclick="showGroup(currentGroup)">← 返回题库</button>' +
      '</div>' +
    '</div>';
  $('progressFill').style.width = '100%';
  $('progressText').textContent = sessionTotal + '/' + sessionTotal;
}

loadQuestions();
</script>
</body>
</html>
