<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据报送导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: #fff;
            font-size: 2.2em;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            margin-bottom: 8px;
        }
        .header p {
            color: rgba(255,255,255,0.8);
            font-size: 1em;
        }
        .cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 28px 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
        .card-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .card-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6em;
            flex-shrink: 0;
        }
        .card:nth-child(1) .card-icon { background: #FFF3E0; }
        .card:nth-child(2) .card-icon { background: #E8F5E9; }
        .card:nth-child(3) .card-icon { background: #E3F2FD; }
        .card-info h2 {
            font-size: 1.1em;
            color: #1a1a2e;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .card-info p {
            font-size: 0.85em;
            color: #888;
        }
        .card-arrow {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 1.2em;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .card:hover .card-arrow {
            background: #667eea;
            color: #fff;
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.6em; }
            .card { padding: 20px; }
            .card-icon { width: 44px; height: 44px; font-size: 1.3em; }
            .card-info h2 { font-size: 1em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>数据报送导航</h1>
            <p>快速访问各数据报送入口</p>
        </div>
        <div class="cards">
            <a href="https://f.wps.cn/g/t5pmUZvi/" target="_blank" class="card">
                <div class="card-left">
                    <div class="card-icon">📋</div>
                    <div class="card-info">
                        <h2>预测数据报送</h2>
                        <p>点击进入 WPS 表单填报</p>
                    </div>
                </div>
                <div class="card-arrow">→</div>
            </a>
            <a href="https://web.wps.cn/wo/sl/v1aE99l" target="_blank" class="card">
                <div class="card-left">
                    <div class="card-icon">📊</div>
                    <div class="card-info">
                        <h2>明细表查询</h2>
                        <p>点击进入金山文档查询</p>
                    </div>
                </div>
                <div class="card-arrow">→</div>
            </a>
            <a href="https://web.wps.cn/wo/sl/v14XzDe2" target="_blank" class="card">
                <div class="card-left">
                    <div class="card-icon">📈</div>
                    <div class="card-info">
                        <h2>统计表查询</h2>
                        <p>点击进入金山文档查询</p>
                    </div>
                </div>
                <div class="card-arrow">→</div>
            </a>
        </div>
    </div>
</body>
</html>
